body:
  text: 禪師慧訓供養佛時邑師慧剛供養佛時維摩主輕車將軍勝州錄事參軍賀蘭思遠菩薛主張充都維那都維那齋主蘇叔昭寺主鎮東將軍林慮太守赫連子悅八關齋主租曹從事郡中正魏德令龐顏大象主雷齊八關齋主龐眾貴光明主雷萇八關齋主馬曇顯菩薛主王法歡八關齋主蘇珍輝平東將軍魏德令范伯醜蓋前劫莫初心路非始攸哉邈乎靡測其源者也自天地替成陰陽啓運靈起滅業報相依莫不染習色塵驚馳愛慾循環五趣亦沉溺四流雖復緣起一生受神識形心電速念念留假使靈芝九轉行極四誠奔月以高昇望玄宮而蹔息猶亦退沒三塗旋還六道不說生死之因緣詎云解脫之果報能仁悟迹前機超後際降靈室駕四門卻遺三殿一心高蹈成无上尊至於化動十方迴三吞大海納須彌雖神照冥通至德潛衍莫不稱相取益物之真實之相因化城以蹔止演眾妙於鷲山及慧日法五屬三千藉有作之功會無為之力航法船於淨常樂天人慕感像法興靈惟敬真顏寄存寶色然州武猛從事汲郡六鄉之秀老遂割損家資率諸邑義五百餘人竝著信情源崇宗千劫故正順一時起津梁於生滅之淵運舟楫於貪慾之海通四衢駕擁三彰竭八倒之流兼義冠鄉閭譽聞邦邑莫不尚祇園而結慕同歸依遂瞻影天竺尚想城眷茲一山僉共嘉力其峻壁單懸遙峰疊流野帶山至如寶塔五層則浮空曜晷金棠百刃則撫日承天木地足並雀離之高妙矣又真儀應像則暉暎龕室神光照爛則太清空隱現無復等級威神相好不可思議復即石以拓玄基因木而架引長廊而交暎接戶牖以相經堂廡霞舒階墀綺合雲生枅向風出簷軒花秀美光開七淨泉流藻注鴻澧八解雖謝菩提吉祥之勝地方同竹園伽藍之妙哉於是名僧德眾煙集如林栖息戒藏之門優遊正定之路結漏永消脫諸塵網般若之力既充所作之功亦辨六時精苦不閑日夜四事奉給無替所須而樹福良田脩功淨土亡情投軫取會將來既事光世上業顯寰中鴻名盛德方傳不朽祇掌寄言雖不盡意題表金石其能已哉乃作銘曰心塗眇極性緒攸玄三才始運一氣延虛成報果妄結因緣有形分段无色已遷於唯大覺隨感現身權影昏俗混相纓塵汎茲永夜濟彼長津緣乖化隱卷跡歸真世崇遺教瞻圖影則寶剎層巖金槃累飾簷宇高臨長楹峻極庭流桂水園開淨色既曰福地實唯淨土息隱桑門淹留緇旅功不虛棄果不妄袪德標千劫聲傳万古維大魏永熙二年歲在甲寅興建至武定元年歲次癸亥八月功就仰為皇家願國祚永延化隆遐劫疆靜境安民寧道澤法界有形等成正覺
